<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>金融 AI 助手</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e, #16213e);
      border-bottom: 1px solid #2d3748;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      font-size: 12px;
      color: #718096;
      margin-top: 2px;
    }

    .disclaimer {
      background: #1a1f2e;
      border-bottom: 1px solid #2d3748;
      padding: 8px 24px;
      font-size: 12px;
      color: #718096;
      text-align: center;
    }

    .disclaimer span { color: #e53e3e; }

    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #718096;
    }

    .welcome h2 {
      font-size: 28px;
      color: #e2e8f0;
      margin-bottom: 12px;
      font-weight: 300;
    }

    .welcome p { margin-bottom: 24px; font-size: 14px; line-height: 1.6; }

    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .quick-btn {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      color: #a0aec0;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: #2d3748;
      border-color: #667eea;
      color: #e2e8f0;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      width: 100%;
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .message.user .avatar { background: #667eea; }
    .message.assistant .avatar { background: linear-gradient(135deg, #667eea, #764ba2); }

    .bubble {
      max-width: calc(100% - 48px);
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      padding: 16px 24px;
      background: #1a1f2e;
      border-top: 1px solid #2d3748;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      max-width: 800px;
      margin: 0 auto;
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 12px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within { border-color: #667eea; }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      resize: none;
      min-height: 24px;
      max-height: 120px;
      font-family: inherit;
      line-height: 1.5;
    }

    #user-input::placeholder { color: #4a5568; }

    #send-btn {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn:not(:disabled):hover { opacity: 0.85; }

    #send-btn svg { width: 18px; height: 18px; fill: white; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: #4a5568;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">💹</div>
  <div>
    <h1>金融 AI 助手</h1>
    <p>股票 · 基金 · 债券 · 理财规划</p>
  </div>
</header>

<div class="disclaimer">
  <span>风险提示：</span>本助手提供的信息仅供参考，不构成投资建议，投资有风险，请谨慎决策。
</div>

<div id="chat-area">
  <div class="welcome" id="welcome">
    <h2>你好，我是你的金融顾问 ✨</h2>
    <p>我可以帮你了解股票、基金、债券等金融知识，<br/>为你提供专业的市场分析和理财建议。</p>
    <div class="quick-questions">
      <button class="quick-btn" onclick="sendQuick(this)">如何开始投资基金？</button>
      <button class="quick-btn" onclick="sendQuick(this)">A股和港股有什么区别？</button>
      <button class="quick-btn" onclick="sendQuick(this)">什么是指数基金？</button>
      <button class="quick-btn" onclick="sendQuick(this)">如何分散投资风险？</button>
      <button class="quick-btn" onclick="sendQuick(this)">债券和股票的区别？</button>
      <button class="quick-btn" onclick="sendQuick(this)">什么是市盈率？</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="输入你的金融问题..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="发送">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="hint">按 Enter 发送，Shift+Enter 换行</p>
</div>

<script>
  const chatArea = document.getElementById('chat-area');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const welcome = document.getElementById('welcome');

  let history = [];
  let isLoading = false;

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function sendQuick(btn) {
    input.value = btn.textContent;
    sendMessage();
  }

  function appendMessage(role, content) {
    if (welcome) welcome.style.display = 'none';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', text);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });

      const data = await res.json();
      removeTyping();

      if (data.success) {
        appendMessage('assistant', data.reply);
        history.push({ role: 'user', content: text });
        history.push({ role: 'assistant', content: data.reply });
        // Keep last 20 messages to avoid token overflow
        if (history.length > 20) history = history.slice(-20);
      } else {
        appendMessage('assistant', '抱歉，出现了一些问题：' + (data.error || '未知错误'));
      }
    } catch (e) {
      removeTyping();
      appendMessage('assistant', '网络错误，请检查连接后重试。');
    }

    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
